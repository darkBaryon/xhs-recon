<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小红书 · 本地库</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="logo">📕 <b>本地小红书</b></div>
  <input id="search" class="search" type="search" placeholder="搜索笔记（标题 / 正文 / 标签 / 作者）">
  <select id="sort" class="sort">
    <option value="date">最新发布</option>
    <option value="like">最多点赞</option>
    <option value="comment">最多评论</option>
    <option value="collect">最多收藏</option>
  </select>
  <div id="stats" class="stats"></div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div id="nav-all" class="nav-item active">🏠 发现</div>
    <div class="nav-title">账号</div>
    <div id="account-list"></div>
  </nav>
  <main id="feed" class="feed"></main>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="note-card" id="note-card"></div>
</div>

<!-- 生成时注入的全库数据（window.FEED_DATA），必须在 app.js 之前 -->
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
