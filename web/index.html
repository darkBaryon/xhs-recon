<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小红书 · 本地库</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="logo-badge">小红书</div>
    <div id="nav-all" class="nav-item active"><span class="ic">🏠</span> 首页</div>
    <div class="nav-title">账号</div>
    <div id="account-list"></div>
    <div id="stats" class="stats"></div>
  </nav>

  <main class="main">
    <div class="search-zone">
      <div class="search-pill">
        <input id="search" type="search" placeholder="搜索笔记（标题 / 正文 / 标签 / 作者）">
        <button class="search-btn" aria-label="搜索">🔍</button>
      </div>
      <div class="channels">
        <div id="channel-tabs" class="tabs"></div>
        <select id="sort" class="sort">
          <option value="date">最新发布</option>
          <option value="like">最多点赞</option>
          <option value="comment">最多评论</option>
          <option value="collect">最多收藏</option>
        </select>
      </div>
    </div>
    <div id="feed" class="feed"></div>
  </main>
</div>

<div id="modal" class="modal hidden">
  <div class="modal-backdrop"></div>
  <div class="note-card" id="note-card"></div>
</div>

<!-- 生成时注入的全库数据（window.FEED_DATA），必须在 app.js 之前 -->
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
