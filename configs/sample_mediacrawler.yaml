provider: mediacrawler
mediacrawler_dir: ../MediaCrawler          # 相对项目根；不存在则降级 fixture
fixture_path: tests/fixtures/search_contents_sample.jsonl   # 降级用
mediacrawler:
  login_type: qrcode                       # 或 cookie（配 cookies）
  cookies: ""
  out_dir: data/raw                        # 真实采集 raw 落此（gitignore）
keywords: ["留学辅导"]
synonyms:
  留学辅导: ["essay辅导"]
search:
  pages: 1
  limit: 20
  sort: time_descending
  window_days: 30
ranking:
  weights:
    note_count: 10
    keyword_hit: 5
    interaction: 0.01
watchlist:
  auto_top_n: 2
  manual:
    - 638ea9d7000000001f01d7f7   # 路觅留学生课程辅导
    - 63a95006000000002801986e   # 辅无忧留学课业辅导规划站
    - 670cac2a000000001d030d44   # Alevel经济张老师-上海超级学长
  max_total: 5
creator:
  notes_per_account: 10
selection:
  top_notes_per_account: 2
  half_life_days: 14
comments:
  enabled: true
  limit: 10
  report_top_k: 3
  fixture_path: tests/fixtures/comments.jsonl   # MediaCrawler 不可用降级 fixture 时使用
logging:
  level: info
  dir: data/logs
  file_enabled: true
export:
  out_dir: data/exports
