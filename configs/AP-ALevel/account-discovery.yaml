# 第二阶段账号剖面配置。当前发生 CAPTCHA，需人工确认恢复后再运行。
provider: mediacrawler
mediacrawler_dir: ../MediaCrawler
mediacrawler:
  login_type: qrcode
  cookies: ""
  out_dir: data/raw
  timeout: 1200
  max_concurrency: 1
  sleep_sec: 10.0
  download_images: false

account_analysis_file: configs/AP-ALevel/accounts-candidates.yaml
account_analysis:
  max_notes: 5
  incremental: false
  fetch_comments: false
  download_images: false

logging:
  level: info
  dir: data/logs
  file_enabled: true
export:
  out_dir: data/exports/ap-alevel
store:
  enabled: true
  database: xhs_recon
