# 领域发现恢复配置：只补 2026-07-18 风控中断留下的 5 个词。
# 当前不要运行；先人工确认验证码消失和登录状态正常。
provider: mediacrawler
mediacrawler_dir: ../MediaCrawler
mediacrawler:
  login_type: qrcode
  cookies: ""
  out_dir: data/raw
  timeout: 1200
  max_concurrency: 1
  sleep_sec: 10.0
  download_images: false

keywords_file: configs/AP-ALevel/keywords-discovery-pending.yaml
search:
  pages: 1
  limit: 10
  sort: popularity_descending
  window_days: 365
  batch_size: 2
  pause_between_batches_sec: 300
ranking:
  weights:
    note_count: 10
    keyword_count: 30
    average_interaction: 0.01

logging:
  level: info
  dir: data/logs
  file_enabled: true
export:
  out_dir: data/exports/ap-alevel
store:
  enabled: true
  database: xhs_recon
