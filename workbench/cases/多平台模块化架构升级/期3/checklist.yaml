# 多平台模块化架构升级 期3：独立 watchlist
必过命令:
  - { name: lint, run: "uv run ruff check src tests web" }
  - { name: 全量测试, run: "uv run pytest -q" }
  - { name: watchlist fixture E2E, run: "uv run pytest -q tests/recon/test_watchlist_e2e.py" }
  - { name: watchlist 增量, run: "uv run pytest -q tests/recon/test_watchlist_use_case.py tests/recon/test_xhs_watchlist_collector.py" }
  - { name: MySQL 状态事务, run: "uv run pytest -q tests/recon/test_mysql_account_repository.py" }
  - { name: 架构独立性, run: "uv run pytest -q tests/recon/architecture tests/recon/test_platform_capabilities.py" }
  - { name: 用户运行配置保持, run: "test \"$(shasum -a 256 'configs/留学辅导/run.yaml' | awk '{print $1}')\" = '3d6d883b523fd27e5acc5a95d39e5bb981d87453ef7ffe82c349ba325ae4859f'" }
  - { name: 工作台视图, run: "python3 workbench/tools/build_views.py --check" }

必存产物:
  - src/recon/application/watchlist/use_case.py
  - src/recon/platforms/xhs/watchlist.py
  - src/recon/infrastructure/output/watchlist_files.py
  - tests/recon/test_watchlist_e2e.py

必含符号:
  - { grep: "class WatchlistCollector", in: "src/recon/application/ports" }
  - { grep: "class SyncWatchlist", in: "src/recon/application/watchlist" }
  - { grep: "def save_watchlist", in: "src/recon/infrastructure/persistence" }

禁留标记:
  - { grep: "collection_runs", in: "src/recon" }
  - { grep: "auto_top_n", in: "src/recon/application/watchlist" }
